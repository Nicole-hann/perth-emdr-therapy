<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Perth EMDR Therapy</title>
  <meta name="description" content="Get in touch with Perth EMDR Therapy. Book an appointment or send an enquiry and we'll reply within two business days." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">Perth EMDR Therapy</a>
    <button class="hamburger" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- NAV OVERLAY -->
  <div class="nav-overlay" role="dialog" aria-label="Navigation menu">
    <button class="nav-close" aria-label="Close menu">&times;</button>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="index.html#services">Services</a>
    <a href="index.html#book">Book Now</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1 class="reveal">Get in Touch</h1>
    <p class="reveal">Send us an appointment request or enquiry and we'll reply within two business days.</p>
  </div>

  <!-- CONTACT FORM -->
  <section class="contact-section">
    <div class="booking-inner">
      <form class="contact-form reveal" novalidate>
        <div class="form-row">
          <input type="text" name="first_name" placeholder="First Name" required />
          <input type="text" name="last_name" placeholder="Last Name" required />
        </div>
        <input type="email" name="email" placeholder="Email" required />
        <input type="tel" name="phone" placeholder="Phone" />
        <textarea name="message" placeholder="Message"></textarea>
        <button type="submit" class="submit-btn">Send Message</button>
      </form>

      <div class="form-success">
        Thank you — we'll be in touch within two business days.
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <span class="footer-logo">Perth EMDR Therapy</span>
    <small>&copy; 2024 Perth EMDR Therapy. All rights reserved.</small>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
